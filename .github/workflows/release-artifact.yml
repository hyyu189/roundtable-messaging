name: release-artifact

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 20

    env:
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Check out exact release history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12.13"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            requirements-release.txt

      - name: Install build and test dependencies
        run: |
          python -m pip install --upgrade -r requirements-release.txt
          python -m pip install -r requirements-dev.txt

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          expected="v$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          test "$GITHUB_REF_NAME" = "$expected"

      - name: Verify source and tests
        run: |
          python scripts/check_public_safety.py
          python -m compileall -q bin roundtable_packaging scripts tests integrations
          python -m pytest -p no:cacheprovider -p no:rerunfailures -q tests

      - name: Build locked offline artifact
        run: python scripts/build_release.py --output-dir artifacts

      - name: Verify outer checksum
        run: cd artifacts && shasum -a 256 --check SHA256SUMS

      - name: Exercise the exact extracted artifact
        shell: bash
        run: |
          set -euo pipefail
          extract_root="$RUNNER_TEMP/roundtable-release-extract"
          setup_home="$RUNNER_TEMP/roundtable-release-home"
          prefix="$setup_home/.roundtable"
          link_dir="$setup_home/.local/bin"
          fake_launchctl="$RUNNER_TEMP/roundtable-fake-launchctl"
          launchctl_sentinel="$RUNNER_TEMP/roundtable-launchctl-invoked"
          export HOME="$setup_home"
          export CODEX_HOME="$setup_home/.codex"
          export RT_RUNTIME_DIR="$prefix/.runtime"
          export RT_CODEX_RUNTIME_DIR="$RT_RUNTIME_DIR"
          mkdir -p \
            "$extract_root" \
            "$setup_home/.local/bin" \
            "$setup_home/.npm-global/bin"
          for harness in claude hermes; do
            printf '%s\n' '#!/bin/sh' 'exit 0' \
              > "$setup_home/.local/bin/$harness"
            chmod +x "$setup_home/.local/bin/$harness"
          done
          printf '%s\n' \
            '#!/bin/sh' \
            'if [ "${1:-}" = "--version" ]; then' \
            '  echo "codex-cli 0.144.6"' \
            'fi' \
            'exit 0' \
            > "$setup_home/.npm-global/bin/codex"
          chmod +x "$setup_home/.npm-global/bin/codex"
          printf '%s\n' \
            '#!/bin/sh' \
            'if [ "${1:-}" = print ]; then exit 113; fi' \
            'touch "$RT_LAUNCHCTL_SENTINEL"' \
            'exit 99' \
            > "$fake_launchctl"
          chmod +x "$fake_launchctl"
          shopt -s nullglob
          artifacts=(artifacts/*.tar.gz)
          test "${#artifacts[@]}" -eq 1
          artifact="${artifacts[0]}"
          tar -xzf "$artifact" -C "$extract_root"
          payloads=("$extract_root"/*)
          test "${#payloads[@]}" -eq 1
          payload="${payloads[0]}"
          test -d "$payload"
          (
            cd "$payload"
            shasum -a 256 --check SHA256SUMS
            test ! -e "$prefix"
            HOME="$setup_home" \
              ROUNDTABLE_BOOTSTRAP_PYTHON="$(command -v python)" \
              ./install --prefix "$prefix" --link-dir "$link_dir"
            export PATH="$link_dir:$PATH"
            HOME="$setup_home" roundtable --help
            setup=(
              "$link_dir/roundtable-setup"
              --home "$setup_home"
              --prefix "$prefix"
              --harness claude
              --harness hermes
              --harness codex
            )
            HOME="$setup_home" \
              RT_LAUNCHCTL="$fake_launchctl" \
              RT_LAUNCHCTL_SENTINEL="$launchctl_sentinel" \
              "${setup[@]}"
            test ! -e "$prefix/harness-setup.json"
            test ! -e "$prefix/.runtime"
            test ! -e "$setup_home/.claude/settings.json"
            test ! -e "$setup_home/.hermes/config.yaml"
            test ! -e "$setup_home/Library/LaunchAgents/com.roundtable.codex-app-server.plist"
            test ! -e "$setup_home/Library/LaunchAgents/com.roundtable.codex-wake.plist"
            test ! -e "$launchctl_sentinel"
            HOME="$setup_home" \
              RT_LAUNCHCTL="$fake_launchctl" \
              RT_LAUNCHCTL_SENTINEL="$launchctl_sentinel" \
              "${setup[@]}" apply
            test -f "$prefix/harness-setup.json"
            test -d "$prefix/.runtime"
            test -f "$setup_home/.claude/settings.json"
            test -f "$setup_home/.hermes/config.yaml"
            test -L "$setup_home/.claude/skills/roundtable"
            test -L "$setup_home/.hermes/plugins/roundtable"
            test -L "$setup_home/.hermes/skills/roundtable"
            test -L "$setup_home/.codex/skills/roundtable"
            test -f "$setup_home/Library/LaunchAgents/com.roundtable.codex-app-server.plist"
            test -f "$setup_home/Library/LaunchAgents/com.roundtable.codex-wake.plist"
            test ! -e "$launchctl_sentinel"
            HOME="$setup_home" \
              RT_LAUNCHCTL="$fake_launchctl" \
              RT_LAUNCHCTL_SENTINEL="$launchctl_sentinel" \
              "${setup[@]}" status
            HOME="$setup_home" \
              CODEX_THREAD_ID= \
              RT_LAUNCHCTL="$fake_launchctl" \
              RT_LAUNCHCTL_SENTINEL="$launchctl_sentinel" \
              "${setup[@]}" remove --unload-codex
            test ! -e "$prefix/harness-setup.json"
            test ! -e "$setup_home/.claude/settings.json"
            test ! -e "$setup_home/.hermes/config.yaml"
            test ! -L "$setup_home/.claude/skills/roundtable"
            test ! -L "$setup_home/.hermes/plugins/roundtable"
            test ! -L "$setup_home/.hermes/skills/roundtable"
            test ! -L "$setup_home/.codex/skills/roundtable"
            test ! -e "$setup_home/Library/LaunchAgents/com.roundtable.codex-app-server.plist"
            test ! -e "$setup_home/Library/LaunchAgents/com.roundtable.codex-wake.plist"
            test ! -e "$launchctl_sentinel"
            HOME="$setup_home" "$link_dir/roundtable-smoke"
            HOME="$setup_home" ./uninstall --prefix "$prefix"
          )
          test ! -e "$prefix/install-manifest.json"
          test ! -e "$link_dir/rt-say"

      - name: Upload candidate without publishing a release
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: roundtable-messaging-macos
          path: artifacts/*
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
